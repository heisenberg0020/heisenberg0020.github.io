# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve -l -H localhost`. If you change this file, please restart the 
# server process.

# Basic Site Settings
# TODO: Modify the following settings to personalize your site
locale                   : "en-US"  # Change if needed (e.g., "en-GB", "fr-FR")
site_theme               : "default" # MODIFY: Choose from "default", "air", "sunrise", "mint", "dirt" or "contrast"
title                    : "Your Name / Site Title"  # MODIFY: Replace with your actual name (e.g., "John Doe")
title_separator          : "-"
name                     : &name "Your Name"  # MODIFY: Replace with your actual name (same as title)
description              : &description "Your Name's academic portfolio"   # MODIFY: Update with your own description (e.g., "PhD student in Computer Science")
url                      : https://academicpages.github.io # MODIFY: Replace with "https://[your-github-username].github.io"
                                                           # Example: "https://heisenberg0020.github.io"
baseurl                  : "" # Leave empty if your site is at the root (https://username.github.io/)
repository               : "academicpages/academicpages.github.io"  # MODIFY: Replace with "your-username/your-username.github.io"

# Site Author - The following control what appear as part of the author content on the side bar.
#               If a field is blank the icon and link will not appear, otherwise it will be shown.
#               Additional customization can be done by editing /_includes/author-profile.html
author:
  # Biographic information
  # TODO: Update all the following fields with your personal information
  avatar           : "profile.png"  # MODIFY: Add your profile image to /images/ folder and update filename
  name             : "Your Sidebar Name"  # MODIFY: Replace with your name as you want it to appear in sidebar
  pronouns         : # OPTIONAL: Add your pronouns (e.g., "she/her", "he/him", "they/them")
  bio              : "Short biography for the left-hand sidebar"  # MODIFY: Write a brief bio (e.g., "PhD student in AI")
  location         : "Earth"  # MODIFY: Replace with your city/country (e.g., "San Francisco, CA")
  employer         : "Red Brick University"  # MODIFY: Replace with your university/company
  uri              : # OPTIONAL: Your personal website URL (if you have one besides this)
  email            : "none@example.org"  # MODIFY: Replace with your actual email address 

  # Academic websites
  # TODO: Add links to your academic profiles (remove the '#' and add your URL)
  # IMPORTANT: Remove or comment out (with #) any profiles you don't have
  academia         : # OPTIONAL: URL to your Academia.edu profile
  arxiv            : # OPTIONAL: URL to your arXiv author page (e.g., "https://arxiv.org/a/lastname_f_1")
  googlescholar    : "https://scholar.google.com/citations?user=PS_CX0AAAAAJ"  # MODIFY: Replace with your Google Scholar profile URL
  inspire-hep      : # OPTIONAL: URL to your INSPIRE-HEP profile
  impactstory      : # OPTIONAL: URL to your ImpactStory profile
  orcid            : "https://orcid.org/yourorcidurl"  # MODIFY: Replace with your actual ORCID URL (e.g., "https://orcid.org/0000-0001-2345-6789")
  semantic         : # OPTIONAL: URL to your Semantic Scholar profile
  ssrn             : # OPTIONAL: URL to your SSRN profile
  pubmed           : "https://www.ncbi.nlm.nih.gov/pubmed/?term=john+snow"  # MODIFY: Replace with your PubMed search URL or remove if not applicable
  researchgate     : # OPTIONAL: URL to your ResearchGate profile
  scopus           : # OPTIONAL: URL to your Scopus profile
  zotero           : # OPTIONAL: URL to your Zotero profile


  # Repositories and software development
  # TODO: Add your usernames for coding/development platforms
  # Remove or comment out (with #) any you don't use
  bitbucket        : # OPTIONAL: Your Bitbucket username
  codepen          : # OPTIONAL: Your CodePen username
  dribbble         : # OPTIONAL: Your Dribbble username
  github           : "academicpages"  # MODIFY: Replace with your GitHub username (e.g., "heisenberg0020")
  kaggle           : # OPTIONAL: Your Kaggle username
  stackoverflow    : # OPTIONAL: Your StackOverflow user number (e.g., "123456" or "123456/username")    

  # Social media
  # TODO: Add your social media usernames/handles
  # Remove or comment out (with #) any platforms you don't use
  artstation       : # OPTIONAL: Your ArtStation username
  bluesky          : "bsky.app" # MODIFY: Replace with your Bluesky username (e.g., "yourname.bsky.social")
  facebook         : # OPTIONAL: Your Facebook username
  flickr           : # OPTIONAL: Your Flickr username
  foursquare       : # OPTIONAL: Your Foursquare username
  goodreads        : # OPTIONAL: Your Goodreads username
  google_plus      : # OPTIONAL: Your Google+ username (deprecated)
  keybase          : # OPTIONAL: Your Keybase username
  instagram        : # OPTIONAL: Your Instagram username
  lastfm           : # OPTIONAL: Your Last.fm username
  linkedin         : # OPTIONAL: Your LinkedIn username (e.g., "john-doe-123456")
  mastodon         : # OPTIONAL: Your Mastodon profile URL
  medium           : # OPTIONAL: Your Medium URL or username
  pinterest        : # OPTIONAL: Your Pinterest username
  soundcloud       : # OPTIONAL: Your SoundCloud username
  steam            : # OPTIONAL: Your Steam username
  telegram         : # OPTIONAL: Your Telegram profile URL
  tumblr           : # OPTIONAL: Your Tumblr username
  twitter          : # OPTIONAL: Your X/Twitter username (without @)
  vine             : # OPTIONAL: Your Vine username (deprecated)
  weibo            : # OPTIONAL: Your Weibo username
  wikipedia        : # OPTIONAL: Your Wikipedia username
  xing             : # OPTIONAL: Your Xing username
  youtube          : # OPTIONAL: Your YouTube channel username or ID
  zhihu            : # OPTIONAL: Your Zhihu username

# Publication Category - The following the list of publication categories and their headings
# TODO: Customize these categories based on your publication types
# You can add/remove categories or change titles as needed
publication_category:
  books:
    title: 'Books'  # MODIFY: Change if needed or remove if you don't have books
  manuscripts:
    title: 'Journal Articles'  # MODIFY: Change title if preferred (e.g., "Peer-Reviewed Articles")
  conferences:
    title: 'Conference Papers'  # MODIFY: Change title if preferred (e.g., "Conference Proceedings")

# Site Settings
teaser                   :  # OPTIONAL: filename of teaser fallback image in /images/ for social media previews
breadcrumbs              : false # MODIFY: Set to 'true' if you want breadcrumb navigation
words_per_minute         : 160  # Used to calculate reading time for posts
future                   : true
read_more                : "disabled" # MODIFY: Set to "enabled" to add "Read more" links to excerpts
talkmap_link             : false      # MODIFY: Set to 'true' to add link to talkmap on talks page
comments:
  provider               : # false (default), "disqus", "discourse", "facebook", "google-plus", "staticman", "custom"
  disqus:
    shortname            :
  discourse:
    server               : # https://meta.discourse.org/t/embedding-discourse-comments-via-javascript/31963 , e.g.: meta.discourse.org
  facebook:
    appid                :
    num_posts            : # 5 (default)
    colorscheme          : # "light" (default), "dark"
staticman:
  allowedFields          : ['name', 'email', 'url', 'message']
  branch                 : "gh-pages" # "master", "gh-pages"
  commitMessage          : "New comment."
  filename               : comment-{@timestamp}
  format                 : "yml"
  moderation             : true
  path                   : "_data/comments/{options.slug}"
  requiredFields         : ['name', 'email', 'message']
  transforms:
    email                : "md5"
  generatedFields:
    date:
      type               : "date"
      options:
        format           : "iso8601" # "iso8601" (default), "timestamp-seconds", "timestamp-milliseconds"
atom_feed:
  hide                   : false     # change to true to hide the RSS feed in the footer
  path                   : # blank (default) uses feed.xml


# SEO Related
# TODO: Add verification codes if you want to track your site with these services
# To get these codes, sign up for each service and add your site
google_site_verification :  # OPTIONAL: Add Google Search Console verification code
bing_site_verification   :  # OPTIONAL: Add Bing Webmaster Tools verification code
alexa_site_verification  :  # OPTIONAL: Add Alexa verification code
yandex_site_verification :  # OPTIONAL: Add Yandex verification code


# Social Sharing
twitter:
  username               : &twitter
facebook:
  username               :
  app_id                 :
  publisher              :
og_image                 :  # Social media default site image
og_description           :  # Social media default site image description
# For specifying social profiles
# - https://developers.google.com/structured-data/customize/social-profiles
social:
  type                   : # Person or Organization (defaults to Person)
  name                   : # If the user or organization name differs from the site's name
  links: # An array of links to social media profiles


# Analytics
# TODO: Set up Google Analytics to track your site visitors (optional but recommended)
# To enable: Change provider to "google-analytics-4", sign up at analytics.google.com, and add your tracking ID
analytics:
  provider               :  "false" # MODIFY: Change to "google-analytics-4" to enable tracking
  google:
    tracking_id          :  # MODIFY: Add your Google Analytics 4 measurement ID (e.g., "G-XXXXXXXXXX")


# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"


# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false


# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false


# These settings control the types of collections used by the template
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/


# These settings control how pages and collections are included in the site
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  # _teaching
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  # _publications
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  # _portfolio
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
      comment: true
  # _talks
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true


# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed # https://sass-lang.com/documentation/file.SASS_REFERENCE.html#output_style


# Outputting
permalink: /:categories/:title/
# paginate: 5 # amount of posts to show
# paginate_path: /page:num/
timezone: Etc/UTC # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones


# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Mimic GitHub Pages with --safe
whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji


# Archives
#  Type
#  - GitHub Pages compatible archive pages built with Liquid ~> type: liquid (default)
#  - Jekyll Archives plugin archive pages ~> type: jekyll-archives
#  Path (examples)
#  - Archive page should exist at path when using Liquid method or you can
#    expect broken links (especially with breadcrumbs enabled)
#  - <base_path>/tags/my-awesome-tag/index.html ~> path: /tags/
#  - <base_path/categories/my-awesome-category/index.html ~> path: /categories/
#  - <base_path/my-awesome-category/index.html ~> path: /
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
# https://github.com/jekyll/jekyll-archives
# jekyll-archives:
#   enabled:
#     - categories
#     - tags
#   layouts:
#     category: archive-taxonomy
#     tag: archive-taxonomy
#   permalinks:
#     category: /categories/:name/
#     tag: /tags/:name/


# HTML Compression
# - https://jch.penibelst.de/
compress_html:
  clippings: all
  ignore:
    envs: development
